name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./medical_service.db
      SECRET_KEY: ci-super-secret-key
      REDIS_URL: redis://localhost:6379
      ML_SERVICE_URL: http://localhost:8001

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run database migrations
      run: |
        alembic upgrade head

    - name: Run static analysis
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run type checking
      run: |
        mypy app/ --ignore-missing-imports

    - name: Start application server
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10

    - name: Start ML service
      run: |
        cd ml_service
        MODEL_TYPE=fasttext uvicorn main:app --host 0.0.0.0 --port 5000 &
        sleep 10
        cd ..

    - name: Run tests
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest tests/ -v --cov=app --cov-report=xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker images
      run: |
        docker build -t medical-service-backend .
        docker build -t medical-service-ml -f ml_service/Dockerfile ml_service/

    - name: Run security scan
      run: |
        docker run --rm -v $(pwd):/app -w /app python:3.9-slim sh -c "pip install safety && safety check --file requirements.txt"
        safety check --file requirements.txt

    - name: Deploy to staging
      run: |
        echo "Deploy to staging environment"
        # Add your deployment commands here

    - name: Run integration tests on staging
      run: |
        echo "Run integration tests against staging"
        # Add integration test commands here