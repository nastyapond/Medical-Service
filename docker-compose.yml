services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - ml-service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000

  ml-service:
    build: ./ml_service
    ports:
      - "5000:5000"
    environment:
      - MODEL_TYPE=rubert

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medical_service
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"